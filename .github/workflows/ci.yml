name: CI

on:
    push:
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    native:
        name: Native
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Print tool versions
              run: |
                  set -euo pipefail
                  cmake --version
                  c++ --version

            - name: Configure native build
              run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

            - name: Build native targets
              run: cmake --build build --parallel

            - name: Run native tests
              run: ctest --test-dir build --output-on-failure

            - name: Configure native build without tests
              run: |
                  set -euo pipefail
                  cmake \
                      -S . \
                      -B build-no-tests \
                      -DBUILD_TESTING=OFF \
                      -DCMAKE_BUILD_TYPE=Release

            - name: Build native target without tests
              run: cmake --build build-no-tests --parallel

    frontend:
        name: Frontend
        runs-on: ubuntu-latest
        timeout-minutes: 15

        defaults:
            run:
                working-directory: app

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Set up Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: app/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run lint
              run: npm run lint

            - name: Build frontend
              run: npm run build

    wasm:
        name: WebAssembly
        runs-on: ubuntu-latest
        timeout-minutes: 20

        env:
            EM_VERSION: 4.0.15

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Set up Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Set up Emscripten
              uses: emscripten-core/setup-emsdk@v15
              with:
                  version: ${{ env.EM_VERSION }}
                  actions-cache-folder: emsdk-cache

            - name: Build and smoke-test WebAssembly module
              run: ./scripts/build-wasm.sh

            - name: Verify WebAssembly artifacts
              run: |
                  set -euo pipefail
                  test -f build-wasm/wasm/keepers.mjs
                  test -f build-wasm/wasm/keepers.wasm

            - name: Copy WebAssembly artifacts into frontend
              run: ./scripts/copy-wasm-to-app.sh

            - name: Install frontend dependencies
              working-directory: app
              run: npm ci

            - name: Run frontend lint
              working-directory: app
              run: npm run lint

            - name: Build frontend with WebAssembly
              working-directory: app
              run: npm run build

            - name: Verify frontend WebAssembly artifacts
              run: |
                  test -f app/dist/assets/generated/keepers.mjs
                  test -f app/dist/assets/generated/keepers.wasm

            - name: Install Chromium for Playwright
              working-directory: app
              run: npx playwright install --with-deps chromium

            - name: Run browser smoke test
              working-directory: app
              run: npm run test:e2e

            - name: Upload Playwright diagnostics
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: |
                      app/playwright-report/
                      app/test-results/
                  if-no-files-found: ignore
                  retention-days: 7
